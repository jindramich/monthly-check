name: Monthly watchlist newsletter

on:
  schedule:
    # 1st of every month, 06:30 UTC
    - cron: "30 6 1 * *"
  workflow_dispatch: {}

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Build and send newsletter
        env:
          YAHOO_COOKIES: ${{ secrets.YAHOO_COOKIES }}
          YAHOO_WATCHLIST_NAME: ${{ secrets.YAHOO_WATCHLIST_NAME }}
          # Temporary cap while testing -- covers only the first 3 tickers
          # (in watchlist order). Remove this line to cover the full watchlist.
          YAHOO_WATCHLIST_LIMIT: "3"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python -m src.main

      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: yahoo-debug-screenshot
          path: yahoo_debug.png
          if-no-files-found: ignore
          retention-days: 5
